<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc"><title id="title">Architecture studio philosophy editorial card</title><desc id="desc">A minimal editorial composition for architecture studio philosophy and design principles.</desc><rect width="760" height="520" rx="36" fill="#f7f1e5"/><g transform="translate(58 58)"><rect width="300" height="380" fill="#1b1d1b"/><text x="36" y="74" fill="#f7f1e5" font-family="Georgia" font-size="42" font-weight="700">Less, but warmer.</text><text x="36" y="132" fill="#c9bca7" font-family="Arial" font-size="15">Architecture pages need mood, restraint, and enough detail to start a serious project conversation.</text><rect x="36" y="300" width="180" height="44" rx="22" fill="#f7f1e5"/></g><g transform="translate(410 64)" stroke="#1b1d1b" fill="none"><circle cx="120" cy="120" r="94"/><path d="M120 26v188M26 120h188M54 54l132 132M186 54L54 186" opacity=".36"/><rect y="270" width="240" height="112"/><path d="M34 340h172M34 310h122"/></g></svg>
