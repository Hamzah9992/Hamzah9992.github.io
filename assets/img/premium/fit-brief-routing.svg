<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-labelledby="title desc"><title id="title">Project brief routing mockup</title><desc id="desc">A route from website type to project brief, showing clear inputs for scope, references, content, and launch goal.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#130c21"/><stop offset="1" stop-color="#301a38"/></linearGradient><linearGradient id="a" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ff8bd1"/><stop offset="1" stop-color="#8db7ff"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-opacity=".34"/></filter></defs><rect width="960" height="640" rx="42" fill="url(#bg)"/><rect x="98" y="90" width="764" height="460" rx="40" fill="#170f29" stroke="#fff" stroke-opacity=".12" filter="url(#s)"/><text x="148" y="152" fill="#fff" font-family="Inter,Arial" font-size="31" font-weight="850">Brief routing</text><text x="148" y="184" fill="#b7accb" font-family="Inter,Arial" font-size="17">Turn a vague request into useful project inputs.</text><g font-family="Inter,Arial" fill="#fff"><g transform="translate(148 250)"><rect width="152" height="138" rx="28" fill="#23183b"/><circle cx="76" cy="54" r="24" fill="url(#a)"/><text x="76" y="106" text-anchor="middle" font-size="15" font-weight="800">Type</text></g><g transform="translate(330 250)"><rect width="152" height="138" rx="28" fill="#23183b"/><circle cx="76" cy="54" r="24" fill="#78f7d4"/><text x="76" y="106" text-anchor="middle" font-size="15" font-weight="800">Scope</text></g><g transform="translate(512 250)"><rect width="152" height="138" rx="28" fill="#23183b"/><circle cx="76" cy="54" r="24" fill="#ffd166"/><text x="76" y="106" text-anchor="middle" font-size="15" font-weight="800">Content</text></g><g transform="translate(694 250)"><rect width="152" height="138" rx="28" fill="#23183b"/><circle cx="76" cy="54" r="24" fill="#8db7ff"/><text x="76" y="106" text-anchor="middle" font-size="15" font-weight="800">Launch</text></g></g><path d="M300 319h30M482 319h30M664 319h30" stroke="#8db7ff" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 10"/><rect x="220" y="448" width="520" height="50" rx="25" fill="#fff" opacity=".08"/><text x="480" y="480" text-anchor="middle" fill="#d9d1e5" font-family="Inter,Arial" font-size="16">project type + references + sections + deadline</text></svg>