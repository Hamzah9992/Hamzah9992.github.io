<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc">
<title id="title">Fitness member milestone proof cards</title><desc id="desc">Progress cards and milestone notes for a fitness studio website.</desc>
<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ff4d00"/><stop offset="1" stop-color="#e8ff3d"/></linearGradient></defs>
<rect width="760" height="520" rx="36" fill="#0b0e14"/>
<circle cx="650" cy="80" r="144" fill="#ff4d00" opacity=".14"/>
<text x="50" y="82" fill="#fff" font-size="30" font-family="Arial" font-weight="900">Member Milestones</text>
<text x="50" y="112" fill="#aeb6c7" font-size="15" font-family="Arial">Proof designed as habits, consistency, and attendance — not medical promises.</text>
<g transform="translate(50 160)">
  <rect width="300" height="250" rx="30" fill="#151d2a" stroke="#ffffff" opacity=".98"/>
  <text x="28" y="54" fill="#fff" font-family="Arial" font-size="22" font-weight="900">12-week streak</text>
  <text x="28" y="82" fill="#cbd5e1" font-family="Arial" font-size="14">Attendance consistency badge</text>
  <g transform="translate(28 120)"><rect width="244" height="16" rx="8" fill="#293244"/><rect width="198" height="16" rx="8" fill="url(#g)"/></g>
  <g font-family="Arial" fill="#fff" font-weight="900"><text x="28" y="190" font-size="44">42</text><text x="106" y="187" font-size="16">classes completed</text></g>
</g>
<g transform="translate(382 160)">
  <rect width="328" height="250" rx="30" fill="#151d2a" stroke="#ffffff" opacity=".98"/>
  <g transform="translate(28 34)"><circle cx="38" cy="38" r="38" fill="#e8ff3d"/><text x="94" y="32" fill="#fff" font-family="Arial" font-size="20" font-weight="900">Member story</text><text x="94" y="58" fill="#cbd5e1" font-family="Arial" font-size="13">More confident with weekly routine</text></g>
  <g transform="translate(28 136)"><rect width="272" height="30" rx="15" fill="#202b3d"/><rect width="216" height="30" rx="15" fill="#1ee6a8"/></g>
  <text x="28" y="206" fill="#aeb6c7" font-family="Arial" font-size="15">Progress is shown as habit-building, class attendance, and personal goals.</text>
</g>
</svg>
