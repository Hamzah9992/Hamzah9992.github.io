    <g font-family="Inter,Arial,sans-serif" font-size="14" font-weight="850"><rect x="134" y="214" width="492" height="38" rx="19" fill="#171A28"/><text x="178" y="238" fill="#F6F7FB">title + description</text><circle cx="156" cy="233" r="12" fill="url(#a)"/>
    <rect x="134" y="272" width="492" height="38" rx="19" fill="#171A28"/><text x="178" y="296" fill="#F6F7FB">Open Graph + social card</text><circle cx="156" cy="291" r="12" fill="url(#a)" opacity=".88"/>
    <rect x="134" y="330" width="492" height="38" rx="19" fill="#171A28"/><text x="178" y="354" fill="#F6F7FB">JSON-LD + manifest + sitemap</text><circle cx="156" cy="349" r="12" fill="url(#a)" opacity=".75"/></g>
