  <rect width="760" height="520" rx="38" fill="url(#bg)"/><path d="M84 150c116-70 226-70 330 0s194 64 266-20" fill="none" stroke="#F9C784" stroke-opacity=".12" stroke-width="26" stroke-linecap="round"/>
