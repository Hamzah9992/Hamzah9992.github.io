<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc"><title id="title">Attorney profile card mockups</title><desc id="desc">Professional attorney profile cards with initials, specialties, and consultation badges.</desc><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#c49a45"/><stop offset="1" stop-color="#f4d58d"/></linearGradient></defs><rect width="760" height="520" rx="36" fill="#0b1726"/><text x="48" y="78" fill="#fff" font-family="Arial" font-size="30" font-weight="900">Attorney Profiles</text><text x="48" y="108" fill="#b9c3d1" font-family="Arial" font-size="15">Human, professional cards for trust-building without invented credentials.</text><g transform="translate(48 150)"><g><rect width="196" height="300" rx="30" fill="#111f32" stroke="#ffffff"/><circle cx="98" cy="76" r="44" fill="url(#g)"/><text x="78" y="88" fill="#111827" font-family="Arial" font-size="28" font-weight="900">AR</text><text x="28" y="158" fill="#fff" font-family="Arial" font-size="21" font-weight="900">Amina Rao</text><text x="28" y="185" fill="#cbd5e1" font-family="Arial" font-size="13">Business advisory</text><rect x="28" y="222" width="142" height="34" rx="17" fill="#c49a45"/></g><g transform="translate(222)"><rect width="196" height="300" rx="30" fill="#111f32" stroke="#ffffff"/><circle cx="98" cy="76" r="44" fill="#7dd3fc"/><text x="80" y="88" fill="#0b1726" font-family="Arial" font-size="28" font-weight="900">VK</text><text x="28" y="158" fill="#fff" font-family="Arial" font-size="21" font-weight="900">Viraj Khan</text><text x="28" y="185" fill="#cbd5e1" font-family="Arial" font-size="13">Contracts and property</text><rect x="28" y="222" width="142" height="34" rx="17" fill="#7dd3fc"/></g><g transform="translate(444)"><rect width="196" height="300" rx="30" fill="#111f32" stroke="#ffffff"/><circle cx="98" cy="76" r="44" fill="#f4d58d"/><text x="78" y="88" fill="#111827" font-family="Ar