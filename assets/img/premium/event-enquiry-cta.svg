  <text x="95" y="190" fill="#fde68a" font-family="Arial,sans-serif" font-size="28" font-weight="800" letter-spacing="4">FINAL CONTACT CTA</text>

  <g filter="url(#shadow)" font-family="Arial">
    <rect x="180" y="280" width="1040" height="480" rx="48" fill="#fff" opacity=".12" stroke="#fff" stroke-opacity=".16"/>
    <rect x="245" y="355" width="420" height="300" rx="32" fill="#fff" opacity=".92"/><rect x="735" y="355" width="360" height="300" rx="32" fill="#111827" opacity=".72"/>
    <text x="295" y="425" fill="#831843" font-size="34" font-weight="900">Plan my event</text>
    <rect x="295" y="470" width="300" height="42" rx="14" fill="#f3f4f6"/><rect x="295" y="530" width="300" height="42" rx="14" fill="#f3f4f6"/><rect x="295" y="590" width="220" height="50" rx="16" fill="url(#gold)"/>
    <text x="785" y="430" fill="#fde68a" font-size="32" font-weight="900">Next step</text><text x="785" y="500" fill="#fff" font-size="25">Share date, guest count, venue idea, and mood.</text><text x="785" y="580" fill="#fef3c7" font-size="23">Static CTA, ready for Appwrite later.</text>
