<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720" role="img" aria-labelledby="title desc"><title id="title">Car detailing process visual</title><desc id="desc">Four-step detailing process from inspect to wash to correct to protect.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#e8fbff"/><stop offset="1" stop-color="#7dd3fc"/></linearGradient></defs><rect width="1000" height="720" rx="44" fill="url(#bg)"/><text x="70" y="90" font-family="Georgia,serif" font-size="50" font-weight="700" fill="#07111f">Detailing process</text><path d="M160 350h680" stroke="#07111f" stroke-width="8" stroke-linecap="round" opacity=".18"/><g font-family="Inter,Arial" font-weight="900"><g transform="translate(100 190)"><circle cx="80" cy="160" r="74" fill="#07111f"/><text x="54" y="172" font-size="34" fill="#fff">01</text><text x="38" y="276" font-size="20" fill="#07111f">Inspect</text></g><g transform="translate(320 190)"><circle cx="80" cy="160" r="74" fill="#10253c"/><text x="52" y="172" font-size="34" fill="#fff">02</text><text x="48" y="276" font-size="20" fill="#07111f">Wash</text></g><g transform="translate(540 190)"><circle cx="80" cy="160" r="74" fill="#0ea5e9"/><text x="52" y="172" font-size="34" fill="#07111f">03</text><text x="36" y="276" font-size="20" fill="#07111f">Correct</text></g><g transform="translate(760 190)"><circle cx="80" cy="160" r="74" fill="#07111f"/><text x="52" y="172" font-size="34" fill="#fff">04</text><text x="38" y="276" font-size="20" fill="#07111f">Protect</text></g></g></svg>
