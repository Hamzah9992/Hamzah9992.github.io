<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc"><title id="title">Mobile app process note mockups</title><desc id="desc">User review cards for a mobile app landing page.</desc><rect width="760" height="520" rx="36" fill="#101936"/><text x="48" y="78" fill="#fff" font-family="Arial" font-size="30" font-weight="900">User Stories</text><text x="48" y="108" fill="#b9c7e6" font-family="Arial" font-size="15">Trust cards for a polished app launch page.</text><g transform="translate(48 154)"><g><rect width="300" height="230" rx="30" fill="#151e3d" stroke="#fff"/><text x="28" y="58" fill="#fff" font-family="Arial" font-size="24" font-weight="900">“Finally easy to follow.”</text><text x="28" y="124" fill="#b9c7e6" font-family="Arial" font-size="14">The onboarding makes the app feel clear before download.</text><circle cx="54" cy="178" r="22" fill="#7c3aed"/></g><g transform="translate(330)"><rect width="300" height="230" rx="30" fill="#151e3d" stroke="#fff"/><text x="28" y="58" fill="#fff" font-family="Arial" font-size="24" font-weight="900">“Beautiful and focused.”</text><text x="28" y="124" fill="#b9c7e6" font-family="Arial" font-size="14">The screenshots and feature cards make the product feel premium.</text><circle cx="54" cy="178" r="22" fill="#06b6d4"/></g></g></svg>
