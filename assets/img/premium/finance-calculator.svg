<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc"><title id="title">Financial calculator style SVG visual</title><desc id="desc">A calculator-style planning visual with sliders, monthly budget rows, and projected scenario cards without promises.</desc><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#34d399"/><stop offset="1" stop-color="#f4d35e"/></linearGradient></defs><rect width="760" height="520" rx="36" fill="#0a1f28"/><text x="48" y="78" fill="#fff" font-family="Arial" font-size="30" font-weight="900">Planning Calculator</text><text x="48" y="108" fill="#bdd7d6" font-family="Arial" font-size="15">Calculator-style visual for scenarios, not guaranteed outcomes.</text><g transform="translate(48 150)"><rect width="310" height="300" rx="30" fill="#102f38" stroke="#fff"/><g fill="#244a55"><rect x="32" y="40" width="246" height="44" rx="18"/><rect x="32" y="110" width="246" height="44" rx="18"/><rect x="32" y="180" width="246" height="44" rx="18"/></g><g fill="url(#g)"><rect x="32" y="40" width="164" height="44" rx="18"/><rect x="32" y="110" width="126" height="44" rx="18"/><rect x="32" y="180" width="198" height="44" rx="18"/></g><text x="32" y="266" fill="#fff" font-family="Arial" font-size="22" font-weight="900">Scenario view</text></g><g transform="translate(394 150)"><rect width="318" height="300" rx="30" fill="#102f38" stroke="#fff"/><text x="30" y="60" fill="#fff" font-family="Arial" font-size="22" font-weight="900">Monthly overview</text><path d="M34 112h250M34 164h250M34 216h250" stroke="#244a55" stroke-width="10" stroke-linecap="round"/><path d="M34 112h168M34 164h112M34 216h206" stroke="url(#g)" stroke-width="10" stroke-linecap="round"/><rect x="30" y="242" width="160" height="38" rx="19" fill="url(#g)"/></g></svg>
