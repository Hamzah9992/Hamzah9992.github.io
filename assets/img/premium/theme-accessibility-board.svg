<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" role="img" aria-labelledby="title desc">
  <title id="title">Theme and accessibility board mockup</title>
  <desc id="desc">A visual board showing dark theme, light theme, keyboard focus, reduced motion, and alt text checks.</desc>
