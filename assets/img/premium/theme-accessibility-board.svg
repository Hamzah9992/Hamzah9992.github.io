  <rect width="760" height="520" rx="38" fill="url(#bg)"/><circle cx="620" cy="100" r="96" fill="#67E8F9" opacity=".09"/><circle cx="132" cy="416" r="110" fill="#A78BFA" opacity=".08"/>
  <g filter="url(#sh)"><rect x="86" y="74" width="588" height="372" rx="34" fill="#0E1320" stroke="#fff" stroke-opacity=".12"/>
