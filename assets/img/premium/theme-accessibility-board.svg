    <rect x="124" y="214" width="210" height="142" rx="24" fill="#151B2B"/><rect x="374" y="214" width="226" height="142" rx="24" fill="#F6F7FB" opacity=".94"/>
    <rect x="148" y="246" width="118" height="16" rx="8" fill="#fff" opacity=".76"/><rect x="148" y="284" width="78" height="34" rx="17" fill="url(#a)"/>
    <rect x="400" y="246" width="120" height="16" rx="8" fill="#111827" opacity=".78"/><rect x="400" y="284" width="80" height="34" rx="17" fill="url(#a)"/>
    <rect x="124" y="384" width="476" height="34" rx="17" fill="url(#a)" opacity=".86"/>
    <text x="246" y="407" fill="#07111A" font-family="Inter,Arial" font-size="13" font-weight="900">Theme, focus, reduced motion, and alt text</text>
