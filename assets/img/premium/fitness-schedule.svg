    <text x="24" y="103">12:15</text><text x="132" y="103">Core + Mobility</text><text x="426" y="103">Coach Ilyas</text>
    <text x="24" y="175">18:30</text><text x="132" y="175">HIIT Ignite</text><text x="426" y="175">Coach Rhea</text>
    <text x="24" y="247">20:00</text><text x="132" y="247">Strength Lab</text><text x="426" y="247">Coach Zayn</text>
