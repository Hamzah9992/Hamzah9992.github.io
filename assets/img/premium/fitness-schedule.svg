<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc">
<title id="title">Fitness class schedule preview</title><desc id="desc">A weekly class schedule board with intensity labels and booking statuses.</desc>
<defs><linearGradient id="a" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ff4d00"/><stop offset="1" stop-color="#e8ff3d"/></linearGradient></defs>
<rect width="760" height="520" rx="36" fill="#0b0e14"/>
<rect x="34" y="34" width="692" height="452" rx="30" fill="#111827" stroke="#ffffff" opacity=".98"/>
<text x="62" y="86" fill="#fff" font-family="Arial" font-size="28" font-weight="900">Weekly Class Board</text>
<text x="62" y="114" fill="#aab2c0" font-family="Arial" font-size="15">Capacity-aware schedule preview for the studio website.</text>
<g transform="translate(62 150)">
  <g fill="#182233"><rect width="636" height="48" rx="16"/><rect y="72" width="636" height="48" rx="16"/><rect y="144" width="636" height="48" rx="16"/><rect y="216" width="636" height="48" rx="16"/></g>
  <g font-family="Arial" font-weight="800" font-size="16" fill="#fff">
