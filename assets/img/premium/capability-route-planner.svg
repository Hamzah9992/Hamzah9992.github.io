  </defs>
  <rect width="960" height="560" rx="42" fill="url(#bg)"/>
  <circle cx="820" cy="90" r="170" fill="#76f7c6" opacity=".12"/>
  <circle cx="120" cy="480" r="190" fill="#d6b56d" opacity=".10"/>
