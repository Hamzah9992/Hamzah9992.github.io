      <stop offset="1" stop-color="#1d2b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#76f7c6"/>
      <stop offset="1" stop-color="#d6b56d"/>
