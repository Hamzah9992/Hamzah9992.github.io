  <text x="86" y="132" fill="#a8b8b1" font-family="Inter, Arial, sans-serif" font-size="15" letter-spacing="2">Capability route planner</text>
  
  <g filter="url(#shadow)">
    <rect x="96" y="172" width="216" height="258" rx="30" fill="#0f1d18" stroke="#ffffff" stroke-opacity=".14"/>
