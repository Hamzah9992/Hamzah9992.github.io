<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc"><title id="title">Financial planning service cards</title><desc id="desc">Six financial advisory service cards for goals, budgeting, retirement, protection, investment review, and business planning.</desc><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#34d399"/><stop offset="1" stop-color="#f4d35e"/></linearGradient></defs><rect width="760" height="520" rx="36" fill="#06151f"/><text x="46" y="78" fill="#fff" font-family="Arial" font-size="30" font-weight="900">Planning Services</text><text x="46" y="108" fill="#bdd7d6" font-family="Arial" font-size="15">Service cards focused on planning clarity, not return promises.</text><g transform="translate(46 150)"><g fill="#102f38" stroke="#fff" opacity=".98"><rect width="202" height="130" rx="26"/><rect x="232" width="202" height="130" rx="26"/><rect x="464" width="202" height="130" rx="26"/><rect y="158" width="202" height="130" rx="26"/><rect x="232" y="158" width="202" height="130" rx="26"/><rect x="464" y="158" width="202" height="130" rx="26"/></g><g fill="url(#g)"><circle cx="48" cy="48" r="20"/><circle cx="280" cy="48" r="20"/><circle cx="512" cy="48" r="20"/><circle cx="48" cy="206" r="20"/><circle cx="280" cy="206" r="20"/><circle cx="512" cy="206" r="20"/></g><g font-family="Arial" font-weight="900" fill="#fff"><text x="28" y="92">Goal planning</text><text x="260" y="92">Budget review</text><text x="492" y="92">Retirement path</text><text x="28" y="250">Protection</text><text x="260" y="250">Portfolio review</text><text x="492" y="250">Business cashflow</text></g></g></svg>
