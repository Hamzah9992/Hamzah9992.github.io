<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc"><title id="title">Financial advisory package cards</title><desc id="desc">Three advisory package cards for clarity session, plan build, and ongoing review.</desc><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#34d399"/><stop offset="1" stop-color="#f4d35e"/></linearGradient></defs><rect width="760" height="520" rx="36" fill="#0a1f28"/><text x="48" y="82" fill="#fff" font-family="Arial" font-size="30" font-weight="900">Advisory Packages</text><text x="48" y="112" fill="#bdd7d6" font-family="Arial" font-size="15">Static package cards for consultation routing.</text><g transform="translate(48 160)"><g><rect width="196" height="276" rx="28" fill="#102f38" stroke="#fff"/><text x="26" y="50" fill="#34d399" font-family="Arial" font-size="13" font-weight="900">CLARITY</text><text x="26" y="96" fill="#fff" font-family="Arial" font-size="28" font-weight="900">Session</text><rect x="26" y="130" width="132" height="10" rx="5" fill="#244a55"/><rect x="26" y="158" width="112" height="10" rx="5" fill="#244a55"/><rect x="26" y="214" width="132" height="36" rx="18" fill="#34d399"/></g><g transform="translate(222)"><rect width="196" height="276" rx="28" fill="url(#g)"/><text x="26" y="50" fill="#06151f" font-family="Arial" font-size="13" font-weight="900">POPULAR</text><text x="26" y="96" fill="#06151f" font-family="Arial" font-size="28" font-weight="900">Plan</text><rect x="26" y="130" width="132" height="10" rx="5" fill="#06151f" opacity=".36"/><rect x="26" y="158" width="112" height="10" rx="5" fill="#06151f" opacity=".36"/><rect x="26" y="214" width="132" height="36" rx="18" fill="#06151f"/></g><g transform="translate(444)"><rect width="196" height="276" rx="28" fill="#102f38" stroke="#fff"/><text x="26" y="50" fill="#f4d35e" font-family="Arial" font-size="13" font-weight="900">ONGOING</text><text x="26" y="96" fill="#fff" font