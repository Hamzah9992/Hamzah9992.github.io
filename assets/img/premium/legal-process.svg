<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc"><title id="title">Consultation process mockup</title><desc id="desc">Four-step consultation process for a law firm website.</desc><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#c49a45"/><stop offset="1" stop-color="#f4d58d"/></linearGradient></defs><rect width="760" height="520" rx="36" fill="#07111f"/><text x="48" y="80" fill="#fff" font-family="Arial" font-size="30" font-weight="900">Consultation Process</text><text x="48" y="110" fill="#b9c3d1" font-family="Arial" font-size="15">A clear intake path makes contacting the firm feel safer and more organized.</text><g transform="translate(72 180)"><path d="M68 74H548" stroke="#314156" stroke-width="8" stroke-linecap="round"/><g font-family="Arial"><g transform="translate(0)"><circle cx="68" cy="74" r="52" fill="url(#g)"/><text x="50" y="83" fill="#111827" font-size="28" font-weight="900">1</text><text x="18" y="160" fill="#fff" font-size="18" font-weight="900">Intake</text></g><g transform="translate(160)"><circle cx="68" cy="74" r="52" fill="#122137" stroke="#fff"/><text x="50" y="83" fill="#f4d58d" font-size="28" font-weight="900">2</text><text x="10" y="160" fill="#fff" font-size="18" font-weight="900">Documents</text></g><g transform="translate(320)"><circle cx="68" cy="74" r="52" fill="#122137" stroke="#fff"/><text x="50" y="83" fill="#f4d58d" font-size="28" font-weight="900">3</text><text x="20" y="160" fill="#fff" font-size="18" font-weight="900">Quality</text></g><g transform="translate(480)"><circle cx="68" cy="74" r="52" fill="#122137" stroke="#fff"/><text x="50" y="83" fill="#f4d58d" font-size="28" font-weight="900">4</text><text x="24" y="160" fill="#fff" font-size="18" font-weight="900">Plan</text></g></g></g></svg>
