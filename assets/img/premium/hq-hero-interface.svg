      <g transform="translate(196 106)"><rect width="120" height="96" rx="24" fill="#07101f"/><text x="24" y="42" fill="#fff" font-family="Inter,Arial" font-size="18" font-weight="900">Admin</text><text x="24" y="70" fill="#9fb2c8" font-family="Inter,Arial" font-size="14">approve</text></g>
