<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">High quality Hamzah website interface artwork</title>
  <desc id="desc">A polished vector dashboard showing a short premium homepage, plans, project inquiry, plan selection, and clean contact flow.</desc>
  <defs>
