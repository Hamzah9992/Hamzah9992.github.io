<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc"><title id="title">Financial advisory proof cards</title><desc id="desc">Trust structure cards for financial advisory process clarity, documented plans, and review cadence.</desc><rect width="760" height="520" rx="36" fill="#06151f"/><text x="48" y="78" fill="#fff" font-family="Arial" font-size="30" font-weight="900">Proof of Process</text><text x="48" y="108" fill="#bdd7d6" font-family="Arial" font-size="15">Trust structure based on clarity and process, not returns.</text><g transform="translate(48 154)"><g><rect width="300" height="230" rx="30" fill="#102f38" stroke="#fff"/><text x="28" y="58" fill="#fff" font-family="Arial" font-size="24" font-weight="900">“We finally saw the full picture.”</text><text x="28" y="124" fill="#bdd7d6" font-family="Arial" font-size="14">The planning process organized goals and trade-offs.</text><circle cx="54" cy="178" r="22" fill="#34d399"/></g><g transform="translate(330)"><rect width="300" height="230" rx="30" fill="#102f38" stroke="#fff"/><text x="28" y="58" fill="#fff" font-family="Arial" font-size="24" font-weight="900">“The review cadence helped.”</text><text x="28" y="124" fill="#bdd7d6" font-family="Arial" font-size="14">Clear checkpoints made planning conversations easier.</text><circle cx="54" cy="178" r="22" fill="#f4d35e"/></g></g></svg>
