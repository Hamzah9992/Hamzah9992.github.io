<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-labelledby="title desc"><title id="title">Risk reduction board mockup</title><desc id="desc">A board of project risk reducers such as checked anchors, local assets, alt text, and package notes.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0b1020"/><stop offset="1" stop-color="#271d39"/></linearGradient><linearGradient id="a" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ff8bd1"/><stop offset="1" stop-color="#78f7d4"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-opacity=".34"/></filter></defs><rect width="960" height="640" rx="42" fill="url(#bg)"/><rect x="116" y="86" width="728" height="468" rx="38" fill="#120f24" stroke="#fff" stroke-opacity=".12" filter="url(#s)"/><text x="164" y="150" fill="#fff" font-family="Inter,Arial" font-size="31" font-weight="850">Risk reducers</text><text x="164" y="182" fill="#b7accb" font-family="Inter,Arial" font-size="17">Checks that keep a static handoff easier to review.</text><g font-family="Inter,Arial"><g transform="translate(164 246)"><rect width="632" height="58" rx="22" fill="#1b1730"/><circle cx="32" cy="29" r="15" fill="url(#a)"/><path d="M25 29l5 6 12-16" fill="none" stroke="#120f24" stroke-width="4" stroke-linecap="round"/><text x="62" y="36" fill="#fff" font-size="17" font-weight="750">Internal anchors resolve before packaging</text></g><g transform="translate(164 322)"><rect width="632" height="58" rx="22" fill="#1b1730"/><circle cx="32" cy="29" r="15" fill="#78f7d4"/><path d="M25 29l5 6 12-16" fill="none" stroke="#120f24" stroke-width="4" stroke-linecap="round"/><text x="62" y="36" fill="#fff" font-size="17" font-weight="750">Local image assets exist and include alt text</text></g><g transform="translate(164 398)"><rect width="632" height="58" rx="22" fill="#1b1730"/><circle cx="32" cy="29" r="15" fill="#ffd166"/><path d="M25 29l5 6 12-16" fill="none" stroke="#120f24" stroke-width="4" stroke-linecap="round"/><text x="62" y="36" fill="#fff" font-size="17" font-weight="750">Build, Appwrite check, and reports stay included</text></g><g transform="translate(164 474)"><rect width="632" height="58" rx="22" fill="#1b1730"/><circle cx="32" cy="29" r="15" fill="#8db7ff"/><path d="M25 29l5 6 12-16" fill="none" stroke="#120f24" stroke-width="4" stroke-linecap="round"/><text x="62" y="36" fill="#fff" font-size="17" font-weight="750">No copied assets or invented client claims added</text></g></g></svg>