<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc"><title id="title">Travel agency planning note mockups</title><desc id="desc">Travel review cards and proof panels for custom travel planning.</desc><rect width="760" height="520" rx="36" fill="#06121f"/><text x="48" y="78" fill="#fff" font-family="Arial" font-size="30" font-weight="900">Traveler Notes</text><text x="48" y="108" fill="#bcd7e5" font-family="Arial" font-size="15">Review cards focused on planning clarity and support.</text><g transform="translate(48 154)"><g><rect width="300" height="230" rx="30" fill="#fff7ed"/><text x="28" y="60" fill="#0f172a" font-family="Arial" font-size="24" font-weight="900">“Everything felt organized.”</text><text x="28" y="132" fill="#64748b" font-family="Arial" font-size="14">The route, dates, and add-ons were easy to understand before booking.</text><text x="28" y="190" fill="#0f766e" font-family="Arial" font-size="13" font-weight="900">COASTAL ITINERARY</text></g><g transform="translate(330)"><rect width="300" height="230" rx="30" fill="#0f766e"/><text x="28" y="60" fill="#fff" font-family="Arial" font-size="24" font-weight="900">“The plan matched our style.”</text><text x="28" y="132" fill="#d9fffb" font-family="Arial" font-size="14">The travel styles section helped us choose the right package.</text><text x="28" y="190" fill="#fef3c7" font-family="Arial" font-size="13" font-weight="900">FAMILY ROUTE</text></g></g></svg>
