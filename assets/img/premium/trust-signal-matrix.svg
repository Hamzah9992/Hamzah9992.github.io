<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-labelledby="title desc"><title id="title">Trust signal matrix mockup</title><desc id="desc">A trust signal matrix showing original visuals, local assets, responsive checks, and clear handoff documents.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172844"/></linearGradient><linearGradient id="a" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#78f7d4"/><stop offset="1" stop-color="#8db7ff"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-opacity=".34"/></filter></defs><rect width="960" height="640" rx="42" fill="url(#bg)"/><rect x="88" y="80" width="784" height="480" rx="42" fill="#0d1729" stroke="#fff" stroke-opacity=".12" filter="url(#s)"/><text x="140" y="146" fill="#fff" font-family="Inter,Arial" font-size="32" font-weight="850">Trust matrix</text><text x="140" y="180" fill="#9fb3c8" font-family="Inter,Arial" font-size="17">Visible quality signals, not invented proof.</text><g font-family="Inter,Arial" fill="#fff"><g transform="translate(140 238)"><rect width="320" height="92" rx="26" fill="#14243a" stroke="#fff" stroke-opacity=".1"/><circle cx="46" cy="46" r="22" fill="url(#a)"/><text x="86" y="42" font-size="19" font-weight="800">Original UI visuals</text><text x="86" y="66" font-size="14" fill="#9fb3c8">Local SVG artwork</text></g><g transform="translate(500 238)"><rect width="320" height="92" rx="26" fill="#14243a" stroke="#fff" stroke-opacity=".1"/><circle cx="46" cy="46" r="22" fill="#ffd166"/><text x="86" y="42" font-size="19" font-weight="800">Static handoff</text><text x="86" y="66" font-size="14" fill="#9fb3c8">Build output + docs</text></g><g transform="translate(140 364)"><rect width="320" height="92" rx="26" fill="#14243a" stroke="#fff" stroke-opacity=".1"/><circle cx="46" cy="46" r="22" fill="#ff8bd1"/><text x="86" y="42" font-size="19" font-weight="800">Responsive review</text><text x="86" y="66" font-size="14" fill="#9fb3c8">Mobile, tablet, desktop</text></g><g transform="translate(500 364)"><rect width="320" height="92" rx="26" fill="#14243a" stroke="#fff" stroke-opacity=".1"/><circle cx="46" cy="46" r="22" fill="#8db7ff"/><text x="86" y="42" font-size="19" font-weight="800">Clean copy rules</text><text x="86" y="66" font-size="14" fill="#9fb3c8">No invented proof claims</text></g></g><path d="M460 284h40M460 410h40" stroke="#8db7ff" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 10"/></svg>