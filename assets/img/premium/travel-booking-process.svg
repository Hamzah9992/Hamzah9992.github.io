<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc"><title id="title">Travel booking process mockup</title><desc id="desc">Four-step travel agency booking process with enquiry, planning, confirmation, and travel prep.</desc><rect width="760" height="520" rx="36" fill="#06121f"/><text x="48" y="80" fill="#fff" font-family="Arial" font-size="30" font-weight="900">Booking Process</text><text x="48" y="110" fill="#bcd7e5" font-family="Arial" font-size="15">A simple enquiry journey for custom trip planning.</text><g transform="translate(72 178)"><path d="M68 74H548" stroke="#1f4154" stroke-width="8" stroke-linecap="round"/><g font-family="Arial"><g><circle cx="68" cy="74" r="52" fill="#f97316"/><text x="50" y="84" fill="#fff" font-size="28" font-weight="900">1</text><text x="24" y="160" fill="#fff" font-size="18" font-weight="900">Enquire</text></g><g transform="translate(160)"><circle cx="68" cy="74" r="52" fill="#0ea5e9"/><text x="50" y="84" fill="#fff" font-size="28" font-weight="900">2</text><text x="38" y="160" fill="#fff" font-size="18" font-weight="900">Plan</text></g><g transform="translate(320)"><circle cx="68" cy="74" r="52" fill="#14b8a6"/><text x="50" y="84" fill="#fff" font-size="28" font-weight="900">3</text><text x="4" y="160" fill="#fff" font-size="18" font-weight="900">Confirm</text></g><g transform="translate(480)"><circle cx="68" cy="74" r="52" fill="#fef3c7"/><text x="50" y="84" fill="#0f172a" font-size="28" font-weight="900">4</text><text x="34" y="160" fill="#fff" font-size="18" font-weight="900">Travel</text></g></g></g></svg>
