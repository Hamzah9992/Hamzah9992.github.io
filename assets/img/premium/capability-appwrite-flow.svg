<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-labelledby="title desc"><title id="title">Appwrite-ready capability flow mockup</title><desc id="desc">A static-to-Appwrite flow showing frontend, auth, database, storage, and deploy-ready handoff.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#130c21"/><stop offset="1" stop-color="#2a1c3a"/></linearGradient><linearGradient id="a" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ff8bd1"/><stop offset="1" stop-color="#8db7ff"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-opacity=".34"/></filter></defs><rect width="960" height="640" rx="42" fill="url(#bg)"/><rect x="104" y="92" width="752" height="456" rx="40" fill="#170f29" stroke="#fff" stroke-opacity=".12" filter="url(#s)"/><text x="154" y="158" fill="#fff" font-family="Inter,Arial" font-size="31" font-weight="850">Static → Appwrite-ready</text><text x="154" y="190" fill="#b7accb" font-family="Inter,Arial" font-size="17">Keep static now, connect backend features later if needed.</text><g font-family="Inter,Arial" fill="#fff"><g transform="translate(154 270)"><rect width="142" height="112" rx="26" fill="#24183d"/><circle cx="71" cy="42" r="22" fill="url(#a)"/><text x="71" y="82" text-anchor="middle" font-size="15" font-weight="850">Frontend</text></g><g transform="translate(330 270)"><rect width="142" height="112" rx="26" fill="#24183d"/><circle cx="71" cy="42" r="22" fill="#78f7d4"/><text x="71" y="82" text-anchor="middle" font-size="15" font-weight="850">Auth</text></g><g transform="translate(506 270)"><rect width="142" height="112" rx="26" fill="#24183d"/><circle cx="71" cy="42" r="22" fill="#ffd166"/><text x="71" y="82" text-anchor="middle" font-size="15" font-weight="850">Data</text></g><g transform="translate(682 270)"><rect width="142" height="112" rx="26" fill="#24183d"/><circle cx="71" cy="42" r="22" fill="#8db7ff"/><text x="71" y="8