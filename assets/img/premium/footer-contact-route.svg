<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-labelledby="title desc"><title id="title">Footer contact route mockup</title><desc id="desc">A contact route mockup showing Gmail, mail app, and copy email actions.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#08131d"/><stop offset="1" stop-color="#173326"/></linearGradient><linearGradient id="a" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#7df7aa"/><stop offset="1" stop-color="#8db7ff"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-opacity=".34"/></filter></defs><rect width="960" height="640" rx="42" fill="url(#bg)"/><rect x="138" y="96" width="684" height="448" rx="40" fill="#0e2023" stroke="#fff" stroke-opacity=".12" filter="url(#s)"/><text x="188" y="162" fill="#fff" font-family="Inter,Arial" font-size="32" font-weight="850">Contact route</text><text x="188" y="196" fill="#9fb3c8" font-family="Inter,Arial" font-size="17">Simple static fallbacks for project inquiries.</text><g font-family="Inter,Arial" fill="#fff"><g transform="translate(188 258)"><rect width="584" height="62" rx="24" fill="#132a2f"/><circle cx="36" cy="31" r="16" fill="url(#a)"/><text x="70" y="39" font-size="18" font-weight="850">Open Gmail draft</text></g><g transform="translate(188 346)"><rect width="584" height="62" rx="24" fill="#132a2f"/><circle cx="36" cy="31" r="16" fill="#ffd166"/><text x="70" y="39" font-size="18" font-weight="850">Use mail app fallback</text></g><g transform="translate(188 434)"><rect width="584" height="62" rx="24" fill="#132a2f"/><circle cx="36" cy="31" r="16" fill="#8db7ff"/><text x="70" y="39" font-size="18" font-weight="850">Copy email quickly</text></g></g></svg>