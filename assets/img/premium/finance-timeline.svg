<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc"><title id="title">Financial planning process timeline</title><desc id="desc">A four-step advisory timeline from discovery to review.</desc><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#34d399"/><stop offset="1" stop-color="#f4d35e"/></linearGradient></defs><rect width="760" height="520" rx="36" fill="#06151f"/><text x="48" y="80" fill="#fff" font-family="Arial" font-size="30" font-weight="900">Planning Timeline</text><text x="48" y="110" fill="#bdd7d6" font-family="Arial" font-size="15">A simple process makes advisory work easier to understand.</text><g transform="translate(72 180)"><path d="M68 74H548" stroke="#244a55" stroke-width="8" stroke-linecap="round"/><g font-family="Arial"><g><circle cx="68" cy="74" r="52" fill="url(#g)"/><text x="50" y="83" fill="#06151f" font-size="28" font-weight="900">1</text><text x="16" y="160" fill="#fff" font-size="18" font-weight="900">Discover</text></g><g transform="translate(160)"><circle cx="68" cy="74" r="52" fill="#102f38" stroke="#fff"/><text x="50" y="83" fill="#f4d35e" font-size="28" font-weight="900">2</text><text x="24" y="160" fill="#fff" font-size="18" font-weight="900">Map</text></g><g transform="translate(320)"><circle cx="68" cy="74" r="52" fill="#102f38" stroke="#fff"/><text x="50" y="83" fill="#f4d35e" font-size="28" font-weight="900">3</text><text x="22" y="160" fill="#fff" font-size="18" font-weight="900">Plan</text></g><g transform="translate(480)"><circle cx="68" cy="74" r="52" fill="#102f38" stroke="#fff"/><text x="50" y="83" fill="#f4d35e" font-size="28" font-weight="900">4</text><text x="18" y="160" fill="#fff" font-size="18" font-weight="900">Quality</text></g></g></g></svg>
