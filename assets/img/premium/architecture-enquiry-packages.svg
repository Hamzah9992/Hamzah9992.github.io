<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc"><title id="title">Architecture enquiry package cards</title><desc id="desc">Three minimalist enquiry package cards for concept, renovation, and full studio projects.</desc><rect width="760" height="520" rx="36" fill="#1b1d1b"/><text x="48" y="82" fill="#f7f1e5" font-family="Georgia" font-size="34" font-weight="700">Project Enquiry Packages</text><text x="48" y="112" fill="#c9bca7" font-family="Arial" font-size="15">Simple cards for starting architecture project conversations.</text><g transform="translate(48 160)"><g><rect width="196" height="276" fill="#fffaf1"/><text x="26" y="54" fill="#756852" font-family="Arial" font-size="13" font-weight="900">CONCEPT</text><text x="26" y="100" fill="#1b1d1b" font-family="Georgia" font-size="28" font-weight="700">Study</text><path d="M26 142h132M26 172h110" stroke="#1b1d1b" stroke-width="6"/><rect x="26" y="218" width="126" height="34" rx="17" fill="#1b1d1b"/></g><g transform="translate(222)"><rect width="196" height="276" fill="#d8c7ad"/><text x="26" y="54" fill="#1b1d1b" font-family="Arial" font-size="13" font-weight="900">POPULAR</text><text x="26" y="100" fill="#1b1d1b" font-family="Georgia" font-size="28" font-weight="700">Renovate</text><path d="M26 142h132M26 172h110" stroke="#1b1d1b" stroke-width="6"/><rect x="26" y="218" width="126" height="34" rx="17" fill="#1b1d1b"/></g><g transform="translate(444)"><rect width="196" height="276" fill="#fffaf1"/><text x="26" y="54" fill="#756852" font-family="Arial" font-size="13" font-weight="900">COMPLETE</text><text x="26" y="100" fill="#1b1d1b" font-family="Georgia" font-size="28" font-weight="700">Full Studio</text><path d="M26 142h132M26 172h110" stroke="#1b1d1b" stroke-width="6"/><rect x="26" y="218" width="126" height="34" rx="17" fill="#1b1d1b"/></g></g></svg>
