<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="690" viewBox="0 0 1080 690" role="img" aria-label="Modern healthcare clinic mockup">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#eaf8f7"/><stop offset=".55" stop-color="#f8fffd"/><stop offset="1" stop-color="#d9efff"/></linearGradient>
    <linearGradient id="teal" x1="0" x2="1"><stop stop-color="#5eead4"/><stop offset="1" stop-color="#0284c7"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#0f2f43" flood-opacity=".18"/></filter>
  </defs>
  <rect width="1080" height="690" rx="30" fill="url(#bg)"/>
  <circle cx="907" cy="96" r="180" fill="#5eead4" opacity=".16"/>
  <circle cx="162" cy="593" r="220" fill="#bae6fd" opacity=".38"/>

  <g filter="url(#shadow)">
    <rect x="96" y="86" width="888" height="518" rx="42" fill="#fff"/>
    <text x="142" y="156" fill="#0f2f43" font-family="Georgia,serif" font-size="46" font-weight="700">Appointment process</text>
    <path d="M200 350 H880" stroke="#bae6fd" stroke-width="18" stroke-linecap="round"/>
    <g font-family="Arial" font-weight="800">
      <circle cx="220" cy="350" r="54" fill="url(#teal)"/><text x="203" y="362" fill="#fff" font-size="30">1</text><text x="155" y="455" fill="#0f2f43" font-size="22">Request</text>
      <circle cx="438" cy="350" r="54" fill="#0f2f43"/><text x="421" y="362" fill="#fff" font-size="30">2</text><text x="374" y="455" fill="#0f2f43" font-size="22">Confirm</text>
      <circle cx="656" cy="350" r="54" fill="url(#teal)"/><text x="639" y="362" fill="#fff" font-size="30">3</text><text x="604" y="455" fill="#0f2f43" font-size="22">Visit</text>
      <circle cx="874" cy="350" r="54" fill="#0f2f43"/><text x="857" y="362" fill="#fff" font-size="30">4</text><text x="820" y="455" fill="#0f2f43" font-size="22">Follow up</text>
    </g>
  </g>

</svg>
