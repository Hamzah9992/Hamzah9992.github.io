      <rect x="150" y="225" width="210" height="190" rx="30" fill="#eaf8f7"/><text x="196" y="305" fill="#0284c7" font-size="42" font-weight="900">Easy</text><text x="190" y="355" fill="#0f2f43" font-size="22" font-weight="800">Appointment flow</text>
      <rect x="435" y="225" width="210" height="190" rx="30" fill="#e0f2fe"/><text x="480" y="305" fill="#0f2f43" font-size="42" font-weight="900">Clear</text><text x="470" y="355" fill="#0f2f43" font-size="22" font-weight="800">Service info</text>
      <rect x="720" y="225" width="210" height="190" rx="30" fill="#eaf8f7"/><text x="760" y="305" fill="#0284c7" font-size="42" font-weight="900">Calm</text><text x="762" y="355" fill="#0f2f43" font-size="22" font-weight="800">Clinic UI</text>
      <rect x="150" y="470" width="780" height="64" rx="22" fill="#0f2f43"/><text x="192" y="512" fill="#eaf8f7" font-size="22" font-weight="800">Informational demo copy only — no diagnosis, treatment promises, or outcome guarantees.</text>
