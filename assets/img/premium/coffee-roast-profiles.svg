<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720" role="img" aria-labelledby="title desc"><title id="title">Coffee roast profile cards</title><desc id="desc">Roast cards for light, medium, dark and espresso profiles with flavor notes.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fff7e8"/><stop offset="1" stop-color="#e7c18a"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#2a160d" flood-opacity=".18"/></filter></defs><rect width="1000" height="720" rx="44" fill="url(#bg)"/><text x="70" y="90" font-family="Georgia,serif" font-size="50" font-weight="700" fill="#2a160d">Roast profiles</text><g filter="url(#s)" font-family="Inter,Arial"><g transform="translate(72 150)"><rect width="198" height="360" rx="32" fill="#fffaf3"/><circle cx="99" cy="110" r="54" fill="#e7c18a"/><text x="46" y="220" font-size="22" font-weight="900" fill="#2a160d">Light</text><text x="46" y="258" font-size="15" fill="#754422">floral · citrus</text></g><g transform="translate(292 150)"><rect width="198" height="360" rx="32" fill="#fffaf3"/><circle cx="99" cy="110" r="54" fill="#c9874a"/><text x="42" y="220" font-size="22" font-weight="900" fill="#2a160d">Medium</text><text x="42" y="258" font-size="15" fill="#754422">caramel · nuts</text></g><g transform="translate(512 150)"><rect width="198" height="360" rx="32" fill="#2a160d"/><circle cx="99" cy="110" r="54" fill="#754422"/><text x="50" y="220" font-size="22" font-weight="900" fill="#fff7e8">Dark</text><text x="50" y="258" font-size="15" fill="#e7c18a">cocoa · spice</text></g><g transform="translate(732 150)"><rect width="198" height="360" rx="32" fill="#2a160d"/><circle cx="99" cy="110" r="54" fill="#f5b36b"/><text x="38" y="220" font-size="22" font-weight="900" fill="#fff7e8">Espresso</text><text x="38" y="258" font-size="15" fill="#e7c18a">syrupy · bold</text></g></g></svg>
