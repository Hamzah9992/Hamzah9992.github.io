<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" role="img" aria-labelledby="title desc">
  <title id="title">Website upgrade map visual</title>
  <desc id="desc">A transformation map showing messaging, visuals, trust, mobile, and launch checks.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1a1320"/><stop offset="1" stop-color="#071019"/></linearGradient><linearGradient id="a" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F9C784"/><stop offset=".55" stop-color="#A78BFA"/><stop offset="1" stop-color="#67E8F9"/></linearGradient><filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000" flood-opacity=".36"/></filter></defs>
  <rect width="760" height="520" rx="38" fill="url(#bg)"/><path d="M96 260h568" stroke="url(#a)" stroke-width="8" stroke-linecap="round" opacity=".45"/>
  <g filter="url(#sh)" font-family="Inter,Arial,sans-serif"><rect x="84" y="94" width="592" height="332" rx="34" fill="#0E1320" stroke="#fff" stroke-opacity=".12"/>
    <text x="126" y="148" fill="#fff" font-size="24" font-weight="900">Upgrade path</text><text x="126" y="178" fill="#A8B0C9" font-size="13">Five visible improvements that help a page feel client-ready.</text>
    <g><circle cx="148" cy="260" r="34" fill="url(#a)"/><text x="138" y="267" fill="#07111A" font-size="18" font-weight="900">1</text><text x="112" y="326" fill="#F6F7FB" font-size="13" font-weight="800">Message</text></g>
    <g><circle cx="264" cy="260" r="34" fill="#161B2A" stroke="#A78BFA" stroke-opacity=".6"/><text x="254" y="267" fill="#A78BFA" font-size="18" font-weight="900">2</text><text x="234" y="326" fill="#F6F7FB" font-size="13" font-weight="800">Visuals</text></g>
    <g><circle cx="380" cy="260" r="34" fill="#161B2A" stroke="#67E8F9" stroke-opacity=".6"/><text x="370" y="267" fill="#67E8F9" font-size="18" font-weight="900">3</text><text x="354" y="326" fill="#F6F7FB" font-size="13" font-weight="800">Trust</text></g>
    <g><circle cx="496" cy="260" r="34" fill="#161B2A" stroke="#F9C784" stroke-opacity=".6"/><text x="486" y="267" fill="#F9C784" font-size="18" font-weight="900">4</text><text x="471" y="326" fill="#F6F7FB" font-size="13" font-weight="800">Mobile</text></g>
    <g><circle cx="612" cy="260" r="34" fill="#161B2A" stroke="#A78BFA" stroke-opacity=".6"/><text x="602" y="267" fill="#A78BFA" font-size="18" font-weight="900">5</text><text x="590" y="326" fill="#F6F7FB" font-size="13" font-weight="800">Launch</text></g>
    <rect x="126" y="362" width="508" height="34" rx="17" fill="url(#a)" opacity=".85"/><text x="284" y="384" fill="#07111A" font-size="13" font-weight="900">A cleaner path from first impression to project enquiry</text>
  </g>
</svg>
