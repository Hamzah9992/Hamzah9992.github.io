<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc"><title id="title">Travel styles visual cards</title><desc id="desc">Travel style cards for honeymoon, family, adventure, city, wellness, and group trips.</desc><rect width="760" height="520" rx="36" fill="#f8fafc"/><text x="48" y="78" fill="#0f172a" font-family="Arial" font-size="30" font-weight="900">Travel Styles</text><text x="48" y="108" fill="#64748b" font-family="Arial" font-size="15">Cards that help travelers self-select the right trip type.</text><g transform="translate(48 150)" font-family="Arial" font-weight="900"><g fill="#0ea5e9"><rect width="200" height="120" rx="26"/><rect x="232" width="200" height="120" rx="26"/><rect x="464" width="200" height="120" rx="26"/></g><g fill="#14b8a6"><rect y="150" width="200" height="120" rx="26"/><rect x="232" y="150" width="200" height="120" rx="26"/><rect x="464" y="150" width="200" height="120" rx="26"/></g><g fill="#fff" font-size="20"><text x="28" y="70">Honeymoon</text><text x="260" y="70">Family</text><text x="492" y="70">Adventure</text><text x="28" y="220">City</text><text x="260" y="220">Wellness</text><text x="492" y="220">Groups</text></g></g></svg>
