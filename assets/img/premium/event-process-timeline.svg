<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-label="Planning Timeline">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0f172a"/><stop offset="1" stop-color="#4c0519"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fde68a"/><stop offset="1" stop-color="#f59e0b"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity=".36"/></filter>
  </defs>
  <rect width="1400" height="980" rx="60" fill="url(#bg)"/>
  <circle cx="1080" cy="130" r="250" fill="#f59e0b" opacity=".18"/>
  <circle cx="210" cy="820" r="280" fill="#fef3c7" opacity=".12"/>
  <path d="M110 190 C300 80 420 270 610 140 C760 35 910 85 1090 185 C1190 240 1270 238 1330 210" fill="none" stroke="#fff" stroke-opacity=".18" stroke-width="4"/>
  <text x="90" y="132" fill="#fff" font-family="Georgia,serif" font-size="78" font-weight="700">Planning Timeline</text>
  <text x="95" y="190" fill="#fde68a" font-family="Arial,sans-serif" font-size="28" font-weight="800" letter-spacing="4">DISCOVERY TO CELEBRATION</text>

  <g filter="url(#shadow)">
    <rect x="120" y="310" width="1160" height="410" rx="42" fill="#fff" opacity=".10" stroke="#fff" stroke-opacity=".18"/>
    <line x1="210" y1="515" x2="1190" y2="515" stroke="#fde68a" stroke-width="8" stroke-linecap="round"/>
    <g font-family="Arial" font-weight="900">
      <circle cx="260" cy="515" r="46" fill="url(#gold)"/><text x="246" y="527" font-size="34" fill="#111827">1</text><text x="195" y="610" font-size="28" fill="#fff">Brief</text>
      <circle cx="570" cy="515" r="46" fill="url(#gold)"/><text x="556" y="527" font-size="34" fill="#111827">2</text><text x="500" y="610" font-size="28" fill="#fff">Design</text>
      <circle cx="880" cy="515" r="46" fill="url(#gold)"/><text x="866" y="527" font-size="34" fill="#111827">3</text><text x="805" y="610" font-size="28" fill="#fff">Produce</text>
      <circle cx="1190" cy="515" r="46" fill="url(#gold)"/><text x="1176" y="527" font-size="34" fill="#111827">4</text><text x="1124" y="610" font-size="28" fill="#fff">Host</text>
    </g>
