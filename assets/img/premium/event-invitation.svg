<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-label="Invitation System">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#4c0519"/><stop offset="1" stop-color="#312e81"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fde68a"/><stop offset="1" stop-color="#f43f5e"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity=".36"/></filter>
  </defs>
  <rect width="1400" height="980" rx="60" fill="url(#bg)"/>
  <circle cx="1080" cy="130" r="250" fill="#f43f5e" opacity=".18"/>
  <circle cx="210" cy="820" r="280" fill="#fef3c7" opacity=".12"/>
  <path d="M110 190 C300 80 420 270 610 140 C760 35 910 85 1090 185 C1190 240 1270 238 1330 210" fill="none" stroke="#fff" stroke-opacity=".18" stroke-width="4"/>
  <text x="90" y="132" fill="#fff" font-family="Georgia,serif" font-size="78" font-weight="700">Invitation System</text>
  <text x="95" y="190" fill="#fde68a" font-family="Arial,sans-serif" font-size="28" font-weight="800" letter-spacing="4">ENQUIRY AND RSVP MOCKUP</text>

  <g filter="url(#shadow)">
    <rect x="210" y="260" width="420" height="560" rx="38" fill="#fff" opacity=".95"/>
    <rect x="770" y="300" width="420" height="460" rx="38" fill="#111827" opacity=".8" stroke="#fff" stroke-opacity=".16"/>
    <text x="270" y="360" fill="#7c2d12" font-family="Georgia" font-size="52" font-weight="700">You are invited</text>
    <line x1="270" y1="425" x2="570" y2="425" stroke="#f59e0b" stroke-width="6"/>
    <text x="270" y="500" fill="#111827" font-family="Arial" font-size="30" font-weight="900">Asteria Events</text><text x="270" y="552" fill="#7c2d12" font-family="Arial" font-size="24">RSVP · menu · schedule</text>
    <rect x="270" y="620" width="270" height="72" rx="22" fill="url(#gold)"/>
    <text x="310" y="666" fill="#111827" font-family="Arial" font-size="24" font-weight="900">Confirm guest list</text>
    <text x="820" y="390" fill="#fde68a" font-family="Arial" font-size="32" font-weight="900">Enquiry board</text>
    <rect x="820" y="450" width="310" height="56" rx="16" fill="#fff" opacity=".14"/><rect x="820" y="535" width="310" height="56" rx="16" fill="#fff" opacity=".14"/><rect x="820" y="620" width="210" height="56" rx="16" fill="#f97316" opacity=".9"/>
