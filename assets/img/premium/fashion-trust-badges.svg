      <rect x="368" y="230" width="180" height="170" rx="30" fill="#2a1820"/><text x="420" y="305" fill="#fff1e7" font-family="Arial" font-size="44" font-weight="900">7d</text><text x="410" y="352" fill="#e8a98d" font-family="Arial" font-size="19">Return</text>
