    <linearGradient id="rose" x1="0" x2="1"><stop stop-color="#fff1e7"/><stop offset="1" stop-color="#d98a68"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000" flood-opacity=".34"/></filter>
  </defs>
  <rect width="1080" height="680" rx="30" fill="url(#bg)"/>
  <circle cx="950" cy="102" r="170" fill="#fff1e7" opacity=".16"/>
  <circle cx="129" cy="598" r="230" fill="#e0a086" opacity=".18"/>

