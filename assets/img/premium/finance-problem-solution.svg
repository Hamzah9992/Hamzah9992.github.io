<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc"><title id="title">Financial client problem and solution mockup</title><desc id="desc">A before-and-after advisory visualization showing scattered accounts becoming a clear plan.</desc><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#34d399"/><stop offset="1" stop-color="#f4d35e"/></linearGradient></defs><rect width="760" height="520" rx="36" fill="#0a1f28"/><text x="48" y="78" fill="#fff" font-family="Arial" font-size="30" font-weight="900">From scattered to structured</text><text x="48" y="108" fill="#bdd7d6" font-family="Arial" font-size="15">Problem/solution storytelling for advisory websites.</text><g transform="translate(48 158)"><rect width="300" height="250" rx="30" fill="#102f38" stroke="#fff"/><text x="28" y="58" fill="#fff" font-family="Arial" font-size="22" font-weight="900">Before</text><g fill="#244a55"><rect x="28" y="100" width="112" height="38" rx="15"/><rect x="164" y="100" width="98" height="38" rx="15"/><rect x="72" y="164" width="150" height="38" rx="15"/></g><text x="28" y="226" fill="#bdd7d6" font-family="Arial" font-size="14">Accounts, goals, and questions feel disconnected.</text></g><g transform="translate(412 158)"><rect width="300" height="250" rx="30" fill="#102f38" stroke="#fff"/><text x="28" y="58" fill="#fff" font-family="Arial" font-size="22" font-weight="900">After</text><path d="M48 144h204" stroke="#244a55" stroke-width="12" stroke-linecap="round"/><path d="M48 144h142" stroke="url(#g)" stroke-width="12" stroke-linecap="round"/><circle cx="48" cy="144" r="24" fill="#34d399"/><circle cx="190" cy="144" r="24" fill="#f4d35e"/><circle cx="252" cy="144" r="24" fill="#244a55"/><text x="28" y="226" fill="#bdd7d6" font-family="Arial" font-size="14">A documented plan organizes decisions and next steps.</text></g></svg>
