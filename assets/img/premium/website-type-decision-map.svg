<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Website type decision map</title>
  <desc id="desc">Premium local illustration for Hamzah website type planning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06120f"/>
      <stop offset="0.55" stop-color="#10211c"/>
      <stop offset="1" stop-color="#1d2b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#76f7c6"/>
      <stop offset="1" stop-color="#d6b56d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="960" height="560" rx="42" fill="url(#bg)"/>
  <circle cx="820" cy="90" r="170" fill="#76f7c6" opacity=".12"/>
  <circle cx="120" cy="480" r="190" fill="#d6b56d" opacity=".10"/>
  <rect x="56" y="54" width="848" height="452" rx="34" fill="#ffffff" opacity=".045" stroke="#ffffff" stroke-opacity=".16"/>
  <text x="86" y="102" fill="#f2fff9" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Hamzah</text>
  <text x="86" y="132" fill="#a8b8b1" font-family="Inter, Arial, sans-serif" font-size="15" letter-spacing="2">Website type decision map</text>
  
  <g filter="url(#shadow)">
    <rect x="86" y="176" width="180" height="132" rx="24" fill="#0f1d18" stroke="#ffffff" stroke-opacity=".14"/>
    <rect x="110" y="204" width="74" height="12" rx="6" fill="url(#accent)"/>
    <text x="110" y="246" fill="#f2fff9" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Business</text>
    <text x="110" y="275" fill="#a8b8b1" font-family="Inter, Arial, sans-serif" font-size="14">Trust, services, contact</text>

    <rect x="286" y="176" width="180" height="132" rx="24" fill="#0f1d18" stroke="#ffffff" stroke-opacity=".14"/>
    <rect x="310" y="204" width="74" height="12" rx="6" fill="url(#accent)"/>
    <text x="310" y="246" fill="#f2fff9" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Creator</text>
    <text x="310" y="275" fill="#a8b8b1" font-family="Inter, Arial, sans-serif" font-size="14">Work proof, identity</text>

    <rect x="486" y="176" width="180" height="132" rx="24" fill="#0f1d18" stroke="#ffffff" stroke-opacity=".14"/>
    <rect x="510" y="204" width="74" height="12" rx="6" fill="url(#accent)"/>
    <text x="510" y="246" fill="#f2fff9" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Store</text>
    <text x="510" y="275" fill="#a8b8b1" font-family="Inter, Arial, sans-serif" font-size="14">Products, offers, flow</text>

    <rect x="686" y="176" width="180" height="132" rx="24" fill="#0f1d18" stroke="#ffffff" stroke-opacity=".14"/>
    <rect x="710" y="204" width="74" height="12" rx="6" fill="url(#accent)"/>
    <text x="710" y="246" fill="#f2fff9" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Product</text>
    <text x="710" y="275" fill="#a8b8b1" font-family="Inter, Arial, sans-serif" font-size="14">Dashboard, SaaS, UI</text>
  </g>
  <path d="M176 332 C272 384 348 384 444 332 S616 280 784 332" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity=".82"/>
  <rect x="206" y="372" width="548" height="64" rx="22" fill="#ffffff" opacity=".07" stroke="#ffffff" stroke-opacity=".14"/>
  <text x="246" y="411" fill="#f2fff9" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">Choose by goal, not by template name</text>

</svg>