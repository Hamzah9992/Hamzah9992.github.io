<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720" role="img" aria-labelledby="title desc"><title id="title">Coffee product cards visual</title><desc id="desc">Retail coffee product cards with bag mockups, origin names and order buttons.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#2a160d"/><stop offset="1" stop-color="#754422"/></linearGradient><linearGradient id="bag" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f5b36b"/><stop offset="1" stop-color="#9c5528"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#160a05" flood-opacity=".28"/></filter></defs><rect width="1000" height="720" rx="44" fill="url(#bg)"/><text x="70" y="90" font-family="Georgia,serif" font-size="50" font-weight="700" fill="#fff7e8">Fresh roast products</text><g filter="url(#s)" font-family="Inter,Arial"><g transform="translate(86 150)"><rect width="250" height="420" rx="34" fill="#fff7e8"/><path d="M82 72h86l24 184H58z" fill="url(#bag)"/><text x="58" y="324" font-size="22" font-weight="900" fill="#2a160d">Ethiopia Bloom</text><text x="58" y="360" font-size="15" fill="#754422">light · berries</text></g><g transform="translate(374 124)"><rect width="250" height="470" rx="34" fill="#fff7e8"/><path d="M82 82h86l24 198H58z" fill="#2a160d"/><text x="58" y="344" font-size="22" font-weight="900" fill="#2a160d">House Blend</text><text x="58" y="380" font-size="15" fill="#754422">medium · caramel</text><rect x="58" y="410" width="130" height="42" rx="21" fill="#2a160d"/></g><g transform="translate(662 150)"><rect width="250" height="420" rx="34" fill="#fff7e8"/><path d="M82 72h86l24 184H58z" fill="#754422"/><text x="58" y="324" font-size="22" font-weight="900" fill="#2a160d">Midnight Espresso</text><text x="58" y="360" font-size="15" fill="#754422">dark · cocoa</text></g></g></svg>
