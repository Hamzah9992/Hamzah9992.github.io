<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc"><title id="title">Mobile app pricing plan mockups</title><desc id="desc">Three pricing cards for free, pro, and team plans on a mobile app landing page.</desc><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#7c3aed"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs><rect width="760" height="520" rx="36" fill="#0f1028"/><text x="48" y="82" fill="#fff" font-family="Arial" font-size="30" font-weight="900">Plans</text><text x="48" y="112" fill="#b9c7e6" font-family="Arial" font-size="15">Clear pricing structure for a polished static app landing page.</text><g transform="translate(48 160)"><g><rect width="196" height="276" rx="28" fill="#151e3d" stroke="#fff"/><text x="26" y="50" fill="#a7f3d0" font-family="Arial" font-size="13" font-weight="900">FREE</text><text x="26" y="96" fill="#fff" font-family="Arial" font-size="28" font-weight="900">Starter</text><rect x="26" y="130" width="132" height="10" rx="5" fill="#334155"/><rect x="26" y="158" width="112" height="10" rx="5" fill="#334155"/><rect x="26" y="214" width="132" height="36" rx="18" fill="#a7f3d0"/></g><g transform="translate(222)"><rect width="196" height="276" rx="28" fill="url(#g)"/><text x="26" y="50" fill="#06121f" font-family="Arial" font-size="13" font-weight="900">POPULAR</text><text x="26" y="96" fill="#06121f" font-family="Arial" font-size="28" font-weight="900">Pro</text><rect x="26" y="130" width="132" height="10" rx="5" fill="#06121f" opacity=".36"/><rect x="26" y="158" width="112" height="10" rx="5" fill="#06121f" opacity=".36"/><rect x="26" y="214" width="132" height="36" rx="18" fill="#06121f"/></g><g transform="translate(444)"><rect width="196" height="276" rx="28" fill="#151e3d" stroke="#fff"/><text x="26" y="50" fill="#06b6d4" font-family="Arial" font-size="13" font-weight="900">TEAM</text><text x="26" y="96" fill="#fff" font-family="Arial" font-size="28" font-weight="900">Business</text><rect x="26" y="130" width="132" height="10" rx="5" fill="#334155"/><rect x="26" y="158" width="112" height="10" rx="5" fill="#334155"/><rect x="26" y="214" width="132" height="36" rx="18" fill="#06b6d4"/></g></g></svg>
