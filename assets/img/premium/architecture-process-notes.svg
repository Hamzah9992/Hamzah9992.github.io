<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc"><title id="title">Architecture process note card mockups</title><desc id="desc">Refined client process note cards for architecture studio website presentation.</desc><rect width="760" height="520" rx="36" fill="#f5efe4"/><text x="48" y="78" fill="#1b1d1b" font-family="Georgia" font-size="34" font-weight="700">Client Notes</text><text x="48" y="108" fill="#756852" font-family="Arial" font-size="15">Trust structure written as studio experience, not inflated credentials.</text><g transform="translate(48 154)"><g><rect width="300" height="230" fill="#fffaf1" stroke="#1b1d1b"/><text x="28" y="58" fill="#1b1d1b" font-family="Georgia" font-size="26" font-weight="700">“Quiet, precise, easy to follow.”</text><text x="28" y="136" fill="#756852" font-family="Arial" font-size="14">The process section helped us understand how the design conversation would work.</text><text x="28" y="190" fill="#1b1d1b" font-family="Arial" font-size="13" font-weight="900">PRIVATE RESIDENCE CONCEPT</text></g><g transform="translate(330)"><rect width="300" height="230" fill="#1b1d1b"/><text x="28" y="58" fill="#f7f1e5" font-family="Georgia" font-size="26" font-weight="700">“The portfolio felt curated.”</text><text x="28" y="136" fill="#c9bca7" font-family="Arial" font-size="14">Project cards and materials gave the studio a premium, believable voice.</text><text x="28" y="190" fill="#f7f1e5" font-family="Arial" font-size="13" font-weight="900">RETAIL INTERIOR STUDY</text></g></g></svg>
